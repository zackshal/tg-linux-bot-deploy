[tool.black]
line-length = 88
target-version = ['py39']

[tool.isort]
profile = "black"

[tool.pylint.format]
max-line-length=120

[tool.pylint.messages_control_control]
disable=["unused-argument","import-error"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true   # чтобы не ругался на отсутствие stubs для paramiko, dotenv и т.п.

[tool.pylint.messages_control]
disable = [
    "missing-module-docstring",   # мы всё равно добавим docstrings
    "missing-function-docstring",
    "too-few-public-methods",
    "logging-fstring-interpolation",
]
